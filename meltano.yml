version: 1
send_anonymous_usage_stats: true
project_id: tap-calendar
plugins:
  extractors:
  - name: tap-calendar
    namespace: tap_calendar
    pip_url: -e .
    capabilities:
    - state
    - catalog
    - discover
    settings:
    - name: service_account_credentials
      kind: password
    - name: delegated_admin_email
    - name: excluded_user_emails
      kind: array
    - name: start_date

